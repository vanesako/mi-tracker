<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
  --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
  --radius: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
    --text: #e8e8e4; --text2: #9a9a96; --text3: #5a5a56;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
.app { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
h1 { font-size: 18px; font-weight: 500; }
.sync-badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; border: 0.5px solid var(--border); color: var(--text3); }
.sync-badge.ok { color: #3B6D11; border-color: #b0d48a; background: #EAF3DE; }
.sync-badge.err { color: #A32D2D; border-color: #f09595; background: #FCEBEB; }
.sync-badge.loading { color: var(--text2); }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
.stat { background: var(--bg); border-radius: var(--radius); padding: 10px 12px; border: 0.5px solid var(--border); }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.stat-value { font-size: 20px; font-weight: 500; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; align-items: center; }
.toolbar input[type="text"], .toolbar select { font-size: 12px; padding: 5px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); height: 30px; }
.toolbar input[type="text"] { flex: 1; min-width: 140px; }
.btn { font-size: 12px; padding: 5px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text); cursor: pointer; height: 30px; white-space: nowrap; }
.btn:hover { background: var(--bg2); }
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-primary:hover { opacity: 0.85; }
.tbl-wrap { overflow-x: auto; width: 100%; border-radius: var(--radius-lg); border: 0.5px solid var(--border); background: var(--bg); }
table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; min-width: 860px; }
th { text-align: left; font-weight: 500; font-size: 10px; color: var(--text2); padding: 8px; border-bottom: 0.5px solid var(--border); white-space: nowrap; letter-spacing: 0.06em; text-transform: uppercase; background: var(--bg2); }
td { padding: 6px 8px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg2); }
.section-header td { background: var(--bg2); font-weight: 500; font-size: 10px; color: var(--text2); padding: 5px 8px; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 0.5px solid var(--border); }
select.inline { font-size: 11px; border: none; background: transparent; color: var(--text2); cursor: pointer; padding: 1px 2px; max-width: 100%; }
select.inline:focus { outline: none; }
.del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.del-btn:hover { color: #E24B4A; }
.peek-cell { cursor: pointer; }
.peek-text { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; border-bottom: 0.5px dashed var(--border2); padding-bottom: 1px; }
.peek-text.empty { color: var(--text3); border-bottom-style: dotted; }
.col-tarea { width: 21%; } .col-area { width: 11%; } .col-pri { width: 7%; }
.col-estado { width: 9%; } .col-bloque { width: 7%; } .col-lugar { width: 7%; }
.col-tiempo { width: 6%; } .col-done { width: 12%; } .col-paso { width: 12%; }
.col-energia { width: 6%; } .col-del { width: 2%; }
.add-bar { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.add-bar input, .add-bar select { font-size: 12px; padding: 5px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); height: 30px; }
.empty-row td { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 13px; }
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 9000; align-items: center; justify-content: center; }
.modal-backdrop.show { display: flex; }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 20px; width: 340px; max-width: 92vw; position: relative; }
.modal-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text2); margin-bottom: 8px; }
.modal textarea { width: 100%; font-size: 13px; color: var(--text); background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 10px; resize: vertical; min-height: 80px; font-family: inherit; line-height: 1.5; }
.modal textarea:focus { outline: none; border-color: var(--text2); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.modal-close-x { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; }
.modal-close-x:hover { color: var(--text); }
</style>
</head>

<div class="app">
  <div class="header">
    <h1>Tracker de tareas</h1>
    <span class="sync-badge loading" id="sync-badge">Conectando...</span>
  </div>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar tarea...">
    <select id="f-area"><option value="">Todas las áreas</option></select>
    <select id="f-pri"><option value="">Prioridad</option><option>Alta</option><option>Media</option><option>Baja</option></select>
    <select id="f-estado"><option value="">Estado</option><option>Pendiente</option><option>En curso</option><option>Bloqueado</option><option>Listo</option></select>
    <select id="f-bloque"><option value="">Bloque</option><option>Mañana</option><option>Tarde</option><option>Noche</option><option>Semana</option><option>Después</option></select>
    <select id="f-energia"><option value="">Energía</option><option>Alta</option><option>Media</option><option>Baja</option></select>
    <button class="btn" onclick="clearDone()">Limpiar listos</button>
    <button class="btn btn-primary" onclick="exportCSV()">Exportar CSV</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-tarea">Tarea</th><th class="col-area">Área</th>
          <th class="col-pri">Prioridad</th><th class="col-estado">Estado</th>
          <th class="col-bloque">Bloque</th><th class="col-lugar">Lugar</th>
          <th class="col-tiempo">Tiempo</th><th class="col-done">Done ✎</th>
          <th class="col-paso">Primer paso ✎</th><th class="col-energia">Energía</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="add-bar">
    <input type="text" id="new-tarea" placeholder="Nueva tarea..." style="flex:2;min-width:150px;">
    <select id="new-area" style="min-width:110px;"><option value="">Área</option></select>
    <select id="new-pri"><option value="Media">Prioridad</option><option>Alta</option><option>Media</option><option>Baja</option></select>
    <select id="new-bloque"><option value="">Bloque</option><option>Mañana</option><option>Tarde</option><option>Noche</option><option>Semana</option><option>Después</option></select>
    <input type="text" id="new-lugar" placeholder="Lugar" style="width:90px;">
    <input type="text" id="new-tiempo" placeholder="Tiempo" style="width:70px;">
    <select id="new-energia"><option value="Media">Energía</option><option>Alta</option><option>Media</option><option>Baja</option></select>
    <button class="btn btn-primary" onclick="addTask()">+ Agregar</button>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal">
    <button class="modal-close-x" onclick="closeModal()">×</button>
    <div class="modal-label" id="modal-label"></div>
    <textarea id="modal-ta" rows="4" placeholder="Escribí aquí..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

let tasks = [];
let modalTaskId = null;
let modalField = null;

function badge(msg, cls) {
  const el = document.getElementById('sync-badge');
  el.textContent = msg;
  el.className = 'sync-badge ' + (cls || '');
}

async function req(method, path, body) {
  const opts = { method, headers: { ...H } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(API + (path || ''), opts);
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  const ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? r.json() : null;
}

async function init() {
  badge('Conectando...', 'loading');
  try {
    const data = await req('GET', '?order=id.asc&limit=2000');
    if (data && data.length > 0) {
      tasks = data;
      badge('Sincronizado', 'ok');
    } else {
      badge('Cargando datos...', 'loading');
      const rows = INITIAL.map(r => ({
        tarea: r[0], area: r[1], pri: r[2], estado: r[3], bloque: r[4],
        lugar: r[5], tiempo: r[6], done: r[7], paso: r[8], energia: r[9]
      }));
      // Insert in batches of 50
      let inserted = [];
      for (let i = 0; i < rows.length; i += 50) {
        const batch = await req('POST', '', rows.slice(i, i + 50));
        if (batch) inserted = inserted.concat(batch);
      }
      tasks = inserted.length > 0 ? inserted : rows;
      badge('Sincronizado', 'ok');
    }
  } catch(e) {
    badge('Sin conexión — modo local', 'err');
    try {
      const d = localStorage.getItem('tasktracker_v2');
      if (d) tasks = JSON.parse(d);
      else {
        tasks = INITIAL.map((r, i) => ({ id: i+1, tarea:r[0],area:r[1],pri:r[2],estado:r[3],bloque:r[4],lugar:r[5],tiempo:r[6],done:r[7],paso:r[8],energia:r[9] }));
      }
    } catch(e2) {}
  }
  render();
  handleURLAdd();
}

async function dbUpdate(id, changes) {
  try {
    await req('PATCH', '?id=eq.' + id, changes);
    badge('Guardado', 'ok');
  } catch(e) { badge('Error al guardar', 'err'); }
}

async function dbInsert(row) {
  try {
    const res = await req('POST', '', [row]);
    badge('Guardado', 'ok');
    return res && res[0] ? res[0] : row;
  } catch(e) { badge('Error al guardar', 'err'); return row; }
}

async function dbDelete(id) {
  try { await req('DELETE', '?id=eq.' + id); badge('Eliminado', 'ok'); }
  catch(e) { badge('Error', 'err'); }
}

async function dbDeleteMany(ids) {
  try { await req('DELETE', '?id=in.(' + ids.join(',') + ')'); badge('Limpios', 'ok'); }
  catch(e) { badge('Error', 'err'); }
}

function populateFilters() {
  const fa = document.getElementById('f-area');
  const na = document.getElementById('new-area');
  const cur = fa.value;
  fa.innerHTML = '<option value="">Todas las áreas</option>';
  na.innerHTML = '<option value="">Área</option>';
  AREAS.forEach(a => {
    fa.innerHTML += `<option${cur === a ? ' selected' : ''}>${a}</option>`;
    na.innerHTML += `<option>${a}</option>`;
  });
}

function sel(field, val, opts, id) {
  return `<select class="inline" onchange="upd(${id},'${field}',this.value)">${opts.map(o => `<option${o === val ? ' selected' : ''}>${o}</option>`).join('')}</select>`;
}

function upd(id, field, val) {
  const t = tasks.find(t => t.id === id);
  if (t) { t[field] = val; dbUpdate(id, { [field]: val }); renderStats(); }
}

function openModal(taskId, field, label) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  modalTaskId = taskId; modalField = field;
  document.getElementById('modal-label').textContent = label + ' — ' + t.tarea;
  document.getElementById('modal-ta').value = t[field] || '';
  document.getElementById('modal-backdrop').classList.add('show');
  setTimeout(() => document.getElementById('modal-ta').focus(), 50);
}

function saveModal() {
  if (modalTaskId && modalField) {
    const val = document.getElementById('modal-ta').value;
    upd(modalTaskId, modalField, val);
    render();
  }
  closeModal();
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('show');
  modalTaskId = null; modalField = null;
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

async function delTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
  await dbDelete(id);
}

async function clearDone() {
  const ids = tasks.filter(t => t.estado === 'Listo').map(t => t.id);
  if (!ids.length) return;
  tasks = tasks.filter(t => t.estado !== 'Listo');
  render();
  await dbDeleteMany(ids);
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const fa = document.getElementById('f-area').value;
  const fp = document.getElementById('f-pri').value;
  const fe = document.getElementById('f-estado').value;
  const fb = document.getElementById('f-bloque').value;
  const fen = document.getElementById('f-energia').value;
  return tasks.filter(t => {
    if (q && !t.tarea.toLowerCase().includes(q)) return false;
    if (fa && t.area !== fa) return false;
    if (fp && t.pri !== fp) return false;
    if (fe && t.estado !== fe) return false;
    if (fb && t.bloque !== fb) return false;
    if (fen && t.energia !== fen) return false;
    return true;
  });
}

function renderStats() {
  const total = tasks.length;
  const listo = tasks.filter(t => t.estado === 'Listo').length;
  const alta = tasks.filter(t => t.pri === 'Alta' && t.estado !== 'Listo').length;
  const hoy = tasks.filter(t => ['Mañana','Tarde','Noche'].includes(t.bloque) && t.estado !== 'Listo').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Listos</div><div class="stat-value">${listo}</div></div>
    <div class="stat"><div class="stat-label">Prioridad alta</div><div class="stat-value">${alta}</div></div>
    <div class="stat"><div class="stat-label">Para hoy</div><div class="stat-value">${hoy}</div></div>
  `;
}

function render() {
  populateFilters();
  renderStats();
  const filtered = getFiltered();
  const tbody = document.getElementById('tbody');
  if (!filtered.length) { tbody.innerHTML = `<tr class="empty-row"><td colspan="11">Sin resultados</td></tr>`; return; }
  const byArea = {};
  filtered.forEach(t => { if (!byArea[t.area]) byArea[t.area] = []; byArea[t.area].push(t); });
  let html = '';
  AREAS.filter(a => byArea[a]).forEach(area => {
    html += `<tr class="section-header"><td colspan="11">${area} <span style="font-weight:400;opacity:0.55">(${byArea[area].length})</span></td></tr>`;
    byArea[area].forEach(t => {
      const dim = t.estado === 'Listo' ? 'opacity:0.4;' : '';
      const dp = (t.done || '').substring(0, 30) + ((t.done || '').length > 30 ? '…' : '');
      const pp = (t.paso || '').substring(0, 30) + ((t.paso || '').length > 30 ? '…' : '');
      html += `<tr style="${dim}">
        <td class="col-tarea" style="font-size:12px;">${t.tarea}</td>
        <td class="col-area">${sel('area', t.area, AREAS, t.id)}</td>
        <td class="col-pri">${sel('pri', t.pri, PRIORIDADES, t.id)}</td>
        <td class="col-estado">${sel('estado', t.estado, ESTADOS, t.id)}</td>
        <td class="col-bloque">${sel('bloque', t.bloque, BLOQUES, t.id)}</td>
        <td style="font-size:11px;color:var(--text2);">${t.lugar || '—'}</td>
        <td style="font-size:11px;color:var(--text2);">${t.tiempo || '—'}</td>
        <td class="peek-cell" onclick="openModal(${t.id},'done','Criterio de done')"><span class="peek-text${!t.done ? ' empty' : ''}">${dp || '—'}</span></td>
        <td class="peek-cell" onclick="openModal(${t.id},'paso','Primer paso')"><span class="peek-text${!t.paso ? ' empty' : ''}">${pp || '—'}</span></td>
        <td class="col-energia">${sel('energia', t.energia, ENERGIAS, t.id)}</td>
        <td><button class="del-btn" onclick="delTask(${t.id})">×</button></td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

async function addTask() {
  const tarea = document.getElementById('new-tarea').value.trim();
  if (!tarea) return;
  const row = {
    tarea,
    area: document.getElementById('new-area').value || 'Backlog',
    pri: document.getElementById('new-pri').value || 'Media',
    estado: 'Pendiente',
    bloque: document.getElementById('new-bloque').value || 'Semana',
    lugar: document.getElementById('new-lugar').value.trim(),
    tiempo: document.getElementById('new-tiempo').value.trim(),
    done: '', paso: '',
    energia: document.getElementById('new-energia').value || 'Media'
  };
  const saved = await dbInsert(row);
  tasks.push(saved);
  document.getElementById('new-tarea').value = '';
  document.getElementById('new-lugar').value = '';
  document.getElementById('new-tiempo').value = '';
  render();
}

function exportCSV() {
  const headers = ['Tarea','Área','Prioridad','Estado','Bloque','Lugar','Tiempo','Criterio de done','Primer paso','Energía'];
  const rows = tasks.map(t => [t.tarea,t.area,t.pri,t.estado,t.bloque,t.lugar,t.tiempo,t.done,t.paso,t.energia].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const blob = new Blob([[headers.join(','), ...rows].join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tareas.csv'; a.click();
}

async function handleURLAdd() {
  const params = new URLSearchParams(window.location.search);
  const addText = params.get('add');
  if (addText && addText.trim()) {
    window.history.replaceState({}, document.title, window.location.pathname);
    const row = { tarea: addText.trim(), area: 'Backlog', pri: 'Media', estado: 'Pendiente', bloque: 'Semana', lugar: '', tiempo: '', done: '', paso: '', energia: 'Media' };
    const saved = await dbInsert(row);
    tasks.push(saved);
    render();
  }
}

document.getElementById('search').addEventListener('input', render);
['f-area','f-pri','f-estado','f-bloque','f-energia'].forEach(id => document.getElementById(id).addEventListener('change', render));
document.getElementById('new-tarea').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('modal-ta').addEventListener('keydown', e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) saveModal(); });

init();
</script>
