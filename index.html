<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker de tareas</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
  --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
  --radius: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
    --text: #e8e8e4; --text2: #9a9a96; --text3: #5a5a56;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
.app { max-width: 1500px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
h1 { font-size: 18px; font-weight: 500; }
.sync-badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; border: 0.5px solid var(--border); color: var(--text3); }
.sync-badge.ok { color: #3B6D11; border-color: #b0d48a; background: #EAF3DE; }
.sync-badge.err { color: #A32D2D; border-color: #f09595; background: #FCEBEB; }
.sync-badge.loading { color: var(--text2); }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
.stat { background: var(--bg); border-radius: var(--radius); padding: 10px 12px; border: 0.5px solid var(--border); }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.stat-value { font-size: 20px; font-weight: 500; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; align-items: center; }
.toolbar input[type="text"], .toolbar select { font-size: 12px; padding: 5px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); height: 30px; }
.toolbar input[type="text"] { flex: 1; min-width: 140px; }
.btn { font-size: 12px; padding: 5px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text); cursor: pointer; height: 30px; white-space: nowrap; }
.btn:hover { background: var(--bg2); }
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-primary:hover { opacity: 0.85; }
.tbl-wrap { overflow-x: auto; width: 100%; border-radius: var(--radius-lg); border: 0.5px solid var(--border); background: var(--bg); }
table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; min-width: 960px; }
th { text-align: left; font-weight: 500; font-size: 10px; color: var(--text2); padding: 8px; border-bottom: 0.5px solid var(--border); white-space: nowrap; letter-spacing: 0.06em; text-transform: uppercase; background: var(--bg2); }
td { padding: 6px 8px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg2); }
.section-header td { background: var(--bg2); font-weight: 500; font-size: 10px; color: var(--text2); padding: 5px 8px; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 0.5px solid var(--border); }
.section-header .area-name { cursor: pointer; border-bottom: 1px dashed var(--text3); }
.section-header .area-name:hover { color: var(--text); }
select.inline { font-size: 11px; border: none; background: transparent; color: var(--text2); cursor: pointer; padding: 1px 2px; max-width: 100%; }
select.inline:focus { outline: none; }
.del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.del-btn:hover { color: #E24B4A; }
.peek-cell { cursor: pointer; }
.peek-text { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; border-bottom: 0.5px dashed var(--border2); padding-bottom: 1px; }
.peek-text.empty { color: var(--text3); border-bottom-style: dotted; }
.editable-input { font-size: 12px; border: none; background: transparent; color: var(--text); width: 100%; font-family: inherit; padding: 0; }
.editable-input:focus { outline: none; border-bottom: 1px solid var(--border2); }
.editable-input.tiempo { font-size: 11px; color: var(--text2); }
.col-tarea  { width: 19%; }
.col-estado { width: 9%;  }
.col-pri    { width: 6%;  }
.col-dia    { width: 8%;  }
.col-tiempo { width: 6%;  }
.col-tipo   { width: 9%;  }
.col-donde  { width: 8%;  }
.col-paso   { width: 13%; }
.col-area   { width: 11%; }
.col-done   { width: 9%;  }
.col-del    { width: 2%;  }
.add-bar { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.add-bar input, .add-bar select { font-size: 12px; padding: 5px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); height: 30px; }
.empty-row td { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 13px; }
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 9000; align-items: center; justify-content: center; }
.modal-backdrop.show { display: flex; }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 20px; width: 340px; max-width: 92vw; position: relative; }
.modal-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text2); margin-bottom: 8px; }
.modal textarea { width: 100%; font-size: 13px; color: var(--text); background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 10px; resize: vertical; min-height: 80px; font-family: inherit; line-height: 1.5; }
.modal textarea:focus { outline: none; border-color: var(--text2); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.modal-close-x { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; }
.modal-close-x:hover { color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Tracker de tareas</h1>
    <span class="sync-badge loading" id="sync-badge">Conectando...</span>
  </div>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar tarea...">
    <select id="f-area"><option value="">Todas las áreas</option></select>
    <select id="f-pri"><option value="">Prioridad</option><option>Alta</option><option>Media</option><option>Baja</option></select>
    <select id="f-estado"><option value="">Estado</option><option>Por hacer</option><option>En curso</option><option>Pendiente</option><option>Bloqueada</option><option>Finalizada</option></select>
    <select id="f-dia"><option value="">Día</option><option>Hoy</option><option>Mañana</option><option>This week</option><option>Weekend</option><option>Next week</option><option>Sin fecha</option></select>
    <select id="f-tipo"><option value="">Tipo</option><option>Deep work</option><option>Contacto</option><option>Mandados</option><option>Tarea</option></select>
    <select id="f-donde"><option value="">Dónde</option><option>Campus</option><option>Palermo</option><option>Compu</option><option>Beraza</option><option>Indistinto</option></select>
    <button class="btn" onclick="clearFinalizadas()">Limpiar finalizadas</button>
    <button class="btn" onclick="openNuevaArea()">+ Nueva área</button>
    <button class="btn btn-primary" onclick="exportCSV()">Exportar CSV</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-tarea">Tarea</th>
          <th class="col-dia">Día</th>
          <th class="col-estado">Estado</th>
          <th class="col-paso">Próx. paso ✎</th>
          <th class="col-pri">Prioridad</th>
          <th class="col-tiempo">Tiempo</th>
          <th class="col-tipo">Tipo</th>
          <th class="col-donde">Dónde</th>
          <th class="col-area">Área</th>
          <th class="col-done">Done ✎</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="add-bar">
    <input type="text" id="new-tarea" placeholder="Nueva tarea..." style="flex:2;min-width:150px;">
    <select id="new-area" style="min-width:110px;"><option value="">Área</option></select>
    <select id="new-pri"><option value="Media">Prioridad</option><option>Alta</option><option>Media</option><option>Baja</option></select>
    <select id="new-dia"><option value="">Día</option><option>Hoy</option><option>Mañana</option><option>This week</option><option>Weekend</option><option>Next week</option><option>Sin fecha</option></select>
    <select id="new-tipo"><option value="">Tipo</option><option>Deep work</option><option>Contacto</option><option>Mandados</option><option>Tarea</option></select>
    <select id="new-donde"><option value="">Dónde</option><option>Campus</option><option>Palermo</option><option>Compu</option><option>Beraza</option><option>Indistinto</option></select>
    <input type="text" id="new-tiempo" placeholder="Tiempo" style="width:70px;">
    <button class="btn btn-primary" onclick="addTask()">+ Agregar</button>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal">
    <button class="modal-close-x" onclick="closeModal()">×</button>
    <div class="modal-label" id="modal-label"></div>
    <textarea id="modal-ta" rows="4" placeholder="Escribí aquí..."></textarea>
    <select id="modal-sel" style="display:none;width:100%;font-size:13px;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-family:inherit;"></select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wievjqdcymqnzyipcezv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xciIM7yhyCr2TRHh7OBd6w_lYAPU2su';
const API = SUPABASE_URL + '/rest/v1/tasks';
const H = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Prefer': 'return=representation'
};

const AREAS = ['IFI — Web y Comm','IFI — Lanzamiento','IFI — Ventas','IFI — Contactos','IFI — Proyectos','Carlos','Casa','Plata','Salud','Personal','Vender','Backlog'];
const PRIORIDADES = ['Alta','Media','Baja'];
const ESTADOS = ['Por hacer','En curso','Pendiente','Bloqueada','Finalizada'];
const DIAS = ['Hoy','Mañana','This week','Weekend','Next week','Sin fecha'];
const TIPOS = ['Deep work','Contacto','Mandados','Tarea'];
const DONDES = ['Campus','Palermo','Compu','Beraza','Indistinto'];

const DIA_ORDER = { 'Hoy': 0, 'Mañana': 1, 'This week': 2, 'Weekend': 3, 'Next week': 4, 'Sin fecha': 5 };

function sortByDia(arr) {
  return [...arr].sort((a, b) => {
    const da = DIA_ORDER[a.dia] ?? 5;
    const db = DIA_ORDER[b.dia] ?? 5;
    return da - db;
  });
}
const ESTADO_MAP = { 'Pendiente':'Por hacer','En curso':'En curso','Bloqueado':'Bloqueada','Listo':'Finalizada' };

function migrateTask(t) {
  if (!t.dia) t.dia = BLOQUE_MAP[t.bloque] || 'Sin fecha';
  if (ESTADO_MAP[t.estado]) t.estado = ESTADO_MAP[t.estado];
  if (!ESTADOS.includes(t.estado)) t.estado = 'Por hacer';
  if (!t.tipo) {
    const em = { 'Alta':'Deep work','Media':'Contacto','Baja':'Mandados' };
    t.tipo = em[t.energia] || 'Contacto';
  }
  if (!t.donde) t.donde = t.lugar || 'Indistinto';
  return t;
}

let tasks = [];
let modalTaskId = null;
let modalField = null;

function badge(msg, cls) {
  const el = document.getElementById('sync-badge');
  el.textContent = msg;
  el.className = 'sync-badge ' + (cls || '');
}

async function req(method, path, body) {
  const opts = { method, headers: { ...H } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(API + (path || ''), opts);
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  const ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? r.json() : null;
}

async function init() {
  badge('Conectando...', 'loading');
  try {
    const data = await req('GET', '?order=id.asc&limit=2000');
    if (data && data.length > 0) {
      const toUpdate = [];
      tasks = data.map(t => {
        const before = { dia: t.dia, estado: t.estado, tipo: t.tipo, donde: t.donde };
        const m = migrateTask({ ...t });
        if (m.dia !== before.dia || m.estado !== before.estado || m.tipo !== before.tipo || m.donde !== before.donde) {
          toUpdate.push({ id: t.id, dia: m.dia, estado: m.estado, tipo: m.tipo, donde: m.donde });
        }
        return m;
      });
      for (const u of toUpdate) {
        req('PATCH', '?id=eq.' + u.id, { dia: u.dia, estado: u.estado, tipo: u.tipo, donde: u.donde }).catch(() => {});
      }
      badge('Sincronizado', 'ok');
    } else {
      badge('Sin datos en DB — usá el tracker anterior para migrar o recargá', 'err');
    }
  } catch(e) {
    badge('Sin conexión — modo local', 'err');
    try {
      const d = localStorage.getItem('tasktracker_v2');
      if (d) tasks = JSON.parse(d).map(t => migrateTask({ ...t }));
    } catch(e2) {}
  }
  render();
  handleURLAdd();
}

async function dbUpdate(id, changes) {
  try { await req('PATCH', '?id=eq.' + id, changes); badge('Guardado', 'ok'); }
  catch(e) { badge('Error al guardar', 'err'); }
}

async function dbInsert(row) {
  try {
    const res = await req('POST', '', [row]);
    badge('Guardado', 'ok');
    return res && res[0] ? res[0] : row;
  } catch(e) { badge('Error al guardar', 'err'); return row; }
}

async function dbDelete(id) {
  try { await req('DELETE', '?id=eq.' + id); badge('Eliminado', 'ok'); }
  catch(e) { badge('Error', 'err'); }
}

async function dbDeleteMany(ids) {
  try { await req('DELETE', '?id=in.(' + ids.join(',') + ')'); badge('Limpias', 'ok'); }
  catch(e) { badge('Error', 'err'); }
}

function populateFilters() {
  const fa = document.getElementById('f-area');
  const na = document.getElementById('new-area');
  const cur = fa.value;
  fa.innerHTML = '<option value="">Todas las áreas</option>';
  na.innerHTML = '<option value="">Área</option>';
  AREAS.forEach(a => {
    fa.innerHTML += `<option${cur === a ? ' selected' : ''}>${a}</option>`;
    na.innerHTML += `<option>${a}</option>`;
  });
}

function sel(field, val, opts, id) {
  const v = opts.includes(val) ? val : opts[0];
  return `<select class="inline" onchange="upd(${id},'${field}',this.value)">${opts.map(o => `<option${o === v ? ' selected' : ''}>${o}</option>`).join('')}</select>`;
}

function upd(id, field, val) {
  const t = tasks.find(t => t.id === id);
  if (t) { t[field] = val; dbUpdate(id, { [field]: val }); renderStats(); }
}

function updTarea(id, val) {
  const t = tasks.find(t => t.id === id);
  if (t && val.trim() && val.trim() !== t.tarea) {
    t.tarea = val.trim();
    dbUpdate(id, { tarea: t.tarea });
  }
}

function updTiempo(id, val) {
  const t = tasks.find(t => t.id === id);
  if (t && val !== t.tiempo) {
    t.tiempo = val;
    dbUpdate(id, { tiempo: val });
  }
}

let modalMode = 'field'; // 'field' | 'rename-area' | 'nueva-area'
let modalAreaOld = null;

function openModal(taskId, field, label) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  modalMode = 'field';
  modalTaskId = taskId; modalField = field;
  document.getElementById('modal-label').textContent = label + ' — ' + t.tarea;
  const ta = document.getElementById('modal-ta');
  const ms = document.getElementById('modal-sel');
  ta.style.display = 'block'; ms.style.display = 'none';
  ta.value = t[field] || '';
  document.getElementById('modal-backdrop').classList.add('show');
  setTimeout(() => ta.focus(), 50);
}

function openRenameArea(area) {
  modalMode = 'rename-area';
  modalAreaOld = area;
  modalTaskId = null; modalField = null;
  document.getElementById('modal-label').textContent = 'Renombrar área';
  const ta = document.getElementById('modal-ta');
  const ms = document.getElementById('modal-sel');
  ta.style.display = 'block'; ms.style.display = 'none';
  ta.rows = 1;
  ta.value = area;
  document.getElementById('modal-backdrop').classList.add('show');
  setTimeout(() => { ta.focus(); ta.select(); }, 50);
}

function openNuevaArea() {
  modalMode = 'nueva-area';
  modalTaskId = null; modalField = null;
  document.getElementById('modal-label').textContent = 'Nueva área';
  const ta = document.getElementById('modal-ta');
  const ms = document.getElementById('modal-sel');
  ta.style.display = 'block'; ms.style.display = 'none';
  ta.rows = 1;
  ta.value = '';
  document.getElementById('modal-backdrop').classList.add('show');
  setTimeout(() => ta.focus(), 50);
}

async function saveModal() {
  if (modalMode === 'rename-area') {
    const newName = document.getElementById('modal-ta').value.trim();
    if (newName && newName !== modalAreaOld) {
      const idx = AREAS.indexOf(modalAreaOld);
      if (idx !== -1) AREAS[idx] = newName;
      else AREAS.push(newName);
      // Actualizar todas las tareas del área
      const toUpdate = tasks.filter(t => t.area === modalAreaOld);
      toUpdate.forEach(t => { t.area = newName; });
      for (const t of toUpdate) {
        req('PATCH', '?id=eq.' + t.id, { area: newName }).catch(() => {});
      }
      render();
    }
  } else if (modalMode === 'nueva-area') {
    const newName = document.getElementById('modal-ta').value.trim();
    if (newName && !AREAS.includes(newName)) {
      AREAS.push(newName);
      render();
    }
  } else if (modalTaskId && modalField) {
    const val = document.getElementById('modal-ta').value;
    upd(modalTaskId, modalField, val);
    render();
  }
  closeModal();
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('show');
  modalTaskId = null; modalField = null; modalAreaOld = null;
  document.getElementById('modal-ta').rows = 4;
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

async function delTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
  await dbDelete(id);
}

async function clearFinalizadas() {
  const ids = tasks.filter(t => t.estado === 'Finalizada').map(t => t.id);
  if (!ids.length) return;
  tasks = tasks.filter(t => t.estado !== 'Finalizada');
  render();
  await dbDeleteMany(ids);
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const fa = document.getElementById('f-area').value;
  const fp = document.getElementById('f-pri').value;
  const fe = document.getElementById('f-estado').value;
  const fd = document.getElementById('f-dia').value;
  const ft = document.getElementById('f-tipo').value;
  const fw = document.getElementById('f-donde').value;
  return tasks.filter(t => {
    if (q && !t.tarea.toLowerCase().includes(q)) return false;
    if (fa && t.area !== fa) return false;
    if (fp && t.pri !== fp) return false;
    if (fe && t.estado !== fe) return false;
    if (fd && t.dia !== fd) return false;
    if (ft && t.tipo !== ft) return false;
    if (fw && t.donde !== fw) return false;
    return true;
  });
}

function renderStats() {
  const total = tasks.length;
  const fin = tasks.filter(t => t.estado === 'Finalizada').length;
  const alta = tasks.filter(t => t.pri === 'Alta' && t.estado !== 'Finalizada').length;
  const hoy = tasks.filter(t => t.dia === 'Hoy' && t.estado !== 'Finalizada').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Finalizadas</div><div class="stat-value">${fin}</div></div>
    <div class="stat"><div class="stat-label">Prioridad alta</div><div class="stat-value">${alta}</div></div>
    <div class="stat"><div class="stat-label">Para hoy</div><div class="stat-value">${hoy}</div></div>
  `;
}

function render() {
  populateFilters();
  renderStats();
  const filtered = getFiltered();
  const tbody = document.getElementById('tbody');
  if (!filtered.length) { tbody.innerHTML = `<tr class="empty-row"><td colspan="11">Sin resultados</td></tr>`; return; }
  const byArea = {};
  filtered.forEach(t => { if (!byArea[t.area]) byArea[t.area] = []; byArea[t.area].push(t); });
  let html = '';
  AREAS.filter(a => byArea[a]).forEach(area => {
    html += `<tr class="section-header"><td colspan="11"><span class="area-name" onclick="openRenameArea('${area.replace(/'/g, "\\'")}')">${area}</span> <span style="font-weight:400;opacity:0.55">(${byArea[area].length})</span></td></tr>`;
    sortByDia(byArea[area]).forEach(t => {
      const dim = t.estado === 'Finalizada' ? 'opacity:0.4;' : '';
      const pp = (t.paso || '').substring(0, 35) + ((t.paso || '').length > 35 ? '…' : '');
      const dp = (t.done || '').substring(0, 25) + ((t.done || '').length > 25 ? '…' : '');
      const tareaEsc = (t.tarea || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      html += `<tr style="${dim}">
        <td class="col-tarea"><input class="editable-input" type="text" value="${tareaEsc}" onblur="updTarea(${t.id},this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td class="col-dia">${sel('dia', t.dia||'Sin fecha', DIAS, t.id)}</td>
        <td class="col-estado">${sel('estado', t.estado, ESTADOS, t.id)}</td>
        <td class="peek-cell col-paso" onclick="openModal(${t.id},'paso','Próx. paso')"><span class="peek-text${!t.paso ? ' empty' : ''}">${pp || '—'}</span></td>
        <td class="col-pri">${sel('pri', t.pri, PRIORIDADES, t.id)}</td>
        <td class="col-tiempo"><input class="editable-input tiempo" type="text" value="${(t.tiempo||'')}" placeholder="—" onblur="updTiempo(${t.id},this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td class="col-tipo">${sel('tipo', t.tipo||'Contacto', TIPOS, t.id)}</td>
        <td class="col-donde">${sel('donde', t.donde||'Indistinto', DONDES, t.id)}</td>
        <td class="col-area">${sel('area', t.area, AREAS, t.id)}</td>
        <td class="peek-cell col-done" onclick="openModal(${t.id},'done','Done')"><span class="peek-text${!t.done ? ' empty' : ''}">${dp || '—'}</span></td>
        <td><button class="del-btn" onclick="delTask(${t.id})">×</button></td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

async function addTask() {
  const tarea = document.getElementById('new-tarea').value.trim();
  if (!tarea) return;
  const row = {
    tarea,
    area: document.getElementById('new-area').value || 'Backlog',
    pri: document.getElementById('new-pri').value || 'Media',
    estado: 'Por hacer',
    dia: document.getElementById('new-dia').value || 'Sin fecha',
    lugar: '',
    tiempo: document.getElementById('new-tiempo').value.trim(),
    done: '', paso: '',
    tipo: document.getElementById('new-tipo').value || 'Contacto',
    donde: document.getElementById('new-donde').value || 'Indistinto'
  };
  const saved = await dbInsert(row);
  tasks.push(saved);
  document.getElementById('new-tarea').value = '';
  document.getElementById('new-tiempo').value = '';
  render();
}

function exportCSV() {
  const headers = ['Tarea','Estado','Prioridad','Día','Próx. paso','Tiempo','Tipo','Dónde','Área','Done'];
  const rows = tasks.map(t => [t.tarea,t.estado,t.pri,t.dia,t.paso,t.tiempo,t.tipo,t.donde,t.area,t.done].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const blob = new Blob([[headers.join(','), ...rows].join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tareas.csv'; a.click();
}

async function handleURLAdd() {
  const params = new URLSearchParams(window.location.search);
  const addText = params.get('add');
  if (addText && addText.trim()) {
    window.history.replaceState({}, document.title, window.location.pathname);
    const row = { tarea: addText.trim(), area: 'Backlog', pri: 'Media', estado: 'Por hacer', dia: 'Sin fecha', lugar: '', tiempo: '', done: '', paso: '', tipo: 'Contacto', donde: 'Indistinto' };
    const saved = await dbInsert(row);
    tasks.push(saved);
    render();
  }
}

document.getElementById('search').addEventListener('input', render);
['f-area','f-pri','f-estado','f-dia','f-tipo','f-donde'].forEach(id => document.getElementById(id).addEventListener('change', render));
document.getElementById('new-tarea').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('modal-ta').addEventListener('keydown', e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) saveModal(); });

init();
</script>
</body>
</html>
